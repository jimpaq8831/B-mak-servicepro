<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#022840">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="B-Mak ServicePro">

<link rel="stylesheet" href="./style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<body>
<div id="sync-badge" style="display:none;position:fixed;top:58px;right:8px;z-index:99;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;transition:opacity .3s"></div>

<div class="hdr">
  <div class="hdr-logo">B-Mak</div>
  <div class="hdr-title">Historique des rapports</div>
</div>

<div class="main">
  <div class="field" style="margin-bottom:12px">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input id="search" class="search-input" type="text" placeholder="Rechercher par client, technicien, No...">
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px">
    <button class="badge badge-teal" id="f-all" onclick="setFilter('all')">Tous</button>
    <button class="badge" id="f-brouillon" onclick="setFilter('brouillon')" style="background:#fff;color:var(--text3);border:1px solid var(--border)">✏️ Brouillons</button>
    <button class="badge" id="f-bon" onclick="setFilter('bon')" style="background:#fff;color:var(--text3);border:1px solid var(--border)">✅ Bon état</button>
    <button class="badge" id="f-suivi" onclick="setFilter('suivi')" style="background:#fff;color:var(--text3);border:1px solid var(--border)">⚠️ Suivi requis</button>
    <button class="badge" id="f-hors" onclick="setFilter('hors')" style="background:#fff;color:var(--text3);border:1px solid var(--border)">🔴 Hors service</button>
  </div>

  <div id="rapport-list"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modal-detail" style="display:none">
<div class="modal">
  <button class="modal-close" onclick="closeDetail()">✕</button>
  <div id="detail-content"></div>
</div></div>

<nav class="nav">
  <a href="./index.html" class="nav-item "><span class="nav-icon">🏠</span>Accueil</a>
  <a href="./clients.html" class="nav-item "><span class="nav-icon">🏭</span>Clients</a>
  <a href="./rapport.html" class="nav-item "><span class="nav-icon">📋</span>Rapport</a>
  <a href="./techniciens.html" class="nav-item "><span class="nav-icon">👷</span>Techs</a>
  <a href="./calendrier.html" class="nav-item "><span class="nav-icon">📅</span>Agenda</a>
</nav>

<script>
// ── B-Mak ServicePro — pdf.js ──
// Shared PDF builder. Used by rapport.html and historique.html.

function buildReportPDF(r, selClientOverride, selMachineOverride, savedSigImgOverride) {
  const jsPDF = window.jspdf.jsPDF;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'letter'});
  const W = 215.9, margin = 16; let y = 0;
  const C = {
    navy:[2,40,64], teal:[3,127,140], tealL:[230,244,245],
    gray:[242,242,242], border:[205,216,224], text3:[108,122,137]
  };

  const c = selClientOverride || DB.clientById(r.cid) || {};
  const m = selMachineOverride || (r.mid ? DB.machineById(r.mid) : null);
  const sigImg = savedSigImgOverride || r.sigImg || r.sig_img || null;
  const tech = r.tech || '—';
  const rnum = r.rnum || r.id || '—';
  const dur  = r.dur  || '—';
  const date = r.date || '—';

  // ── Header ──
  doc.setFillColor(...C.navy); doc.rect(0,0,W,38,'F');
  doc.setFont('helvetica','bolditalic'); doc.setFontSize(24);
  doc.setTextColor(...C.teal); doc.text('B-Mak', margin, 24);
  doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.setTextColor(180,190,200);
  doc.text('RAPPORT DE SERVICE  /  SERVICE REPORT', margin+50, 20);
  doc.setTextColor(255,255,255); doc.setFontSize(9);
  doc.text('No: '+rnum, W-margin, 18, {align:'right'});
  doc.text(fmtDate(date), W-margin, 25, {align:'right'});
  y = 46;

  // ── Client box ──
  doc.setFillColor(...C.gray); doc.setDrawColor(...C.border); doc.setLineWidth(0.3);
  doc.roundedRect(margin, y, 86, 48, 3, 3, 'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...C.teal);
  doc.text('CLIENT', margin+4, y+8);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...C.navy);
  const cn = doc.splitTextToSize(c.nom||'—', 76);
  doc.text(cn, margin+4, y+15);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...C.text3);
  let cy2 = y+15+cn.length*5;
  if(c.adresse){doc.text(c.adresse, margin+4, cy2); cy2+=5;}
  if(c.ville){doc.text(c.ville+', '+c.province, margin+4, cy2); cy2+=5;}
  if(c.tel) doc.text(c.tel, margin+4, cy2);

  // ── Machine box ──
  const mx = margin+90;
  doc.setFillColor(...C.gray); doc.roundedRect(mx, y, W-margin-mx, 48, 3, 3, 'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...C.teal);
  doc.text('MACHINE / ÉQUIPEMENT', mx+4, y+8);
  if(m){
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...C.navy);
    doc.text(m.type||'—', mx+4, y+15);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...C.text3);
    doc.text('Marque: '+(m.marque||'—'), mx+4, y+22);
    if(m.modele&&m.modele!=='-') doc.text('Modèle: '+m.modele, mx+4, y+28);
    doc.text('S/N: '+(m.serial||'—'), mx+4, y+34);
  } else {
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...C.text3);
    doc.text('Non spécifiée', mx+4, y+18);
  }
  y += 54;

  // ── Info band ──
  doc.setFillColor(...C.tealL); doc.roundedRect(margin, y, W-margin*2, 13, 2, 2, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...C.teal);
  doc.text('TECHNICIEN', margin+4, y+5);
  doc.text('DATE', margin+60, y+5);
  doc.text('DURÉE', margin+100, y+5);
  doc.text('No.', margin+130, y+5);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...C.navy);
  doc.text(tech, margin+4, y+11);
  doc.text(fmtDate(date), margin+60, y+11);
  doc.text(dur, margin+100, y+11);
  doc.text(rnum, margin+130, y+11);
  y += 19;

  function section(fr, en) {
    doc.setFillColor(...C.navy); doc.rect(margin, y, W-margin*2, 7, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(255,255,255);
    doc.text(fr+' / '+en, margin+3, y+5); y += 11;
  }
  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  // ── Tasks ──
  (r.taches || []).forEach((t, i) => {
    if(y > 240) { doc.addPage(); y = 18; }
    section('TÂCHE '+(i+1)+(t.itype?' — '+t.itype.toUpperCase():''), 'TASK '+(i+1));

    const dlines = doc.splitTextToSize(t.desc||'—', W-margin*2-8);
    const dh = Math.max(16, dlines.length*5+6);
    doc.setFillColor(255,255,255); doc.setDrawColor(...C.border); doc.setLineWidth(0.3);
    doc.roundedRect(margin, y, W-margin*2, dh, 2, 2, 'FD');
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...C.navy);
    doc.text(dlines, margin+4, y+6); y += dh+4;

    if(t.etat) {
      const s = statusSty(t.etat);
      doc.setFillColor(...hexToRgb(s.bg)); doc.setDrawColor(...hexToRgb(s.border)); doc.setLineWidth(0.4);
      doc.roundedRect(margin, y, W-margin*2, 12, 2, 2, 'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...hexToRgb(s.color));
      doc.text('ÉTAT: '+t.etat, margin+4, y+9); y += 17;
    }
    if(t.reco) {
      const rlines = doc.splitTextToSize(t.reco, W-margin*2-8);
      const rh = Math.max(14, rlines.length*5+6);
      doc.setFillColor(255,248,238); doc.setDrawColor(180,80,0); doc.setLineWidth(0.3);
      doc.roundedRect(margin, y, W-margin*2, rh, 2, 2, 'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(180,80,0);
      doc.text('RECOMMANDATIONS', margin+4, y+5);
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...C.navy);
      doc.text(rlines, margin+4, y+11); y += rh+6;
    }
    const photos = Array.isArray(t.photos) ? t.photos : [];
    if(photos.length) {
      if(y > 200) { doc.addPage(); y = 18; }
      const iw = (W-margin*2-6)/2, ih = 44;
      photos.slice(0,6).forEach((src, pi) => {
        const col = pi%2, row = Math.floor(pi/2);
        const px = margin+col*(iw+6), py = y+row*(ih+6);
        if(py+ih > 265) { doc.addPage(); y = 18; }
        try {
          const fmt = src.startsWith('data:image/jpeg') ? 'JPEG' : 'PNG';
          doc.addImage(src, fmt, px, py, iw, ih, '', 'MEDIUM');
          doc.setDrawColor(...C.border); doc.setLineWidth(0.3);
          doc.rect(px, py, iw, ih, 'S');
        } catch(e) {}
      });
      y += Math.ceil(Math.min(photos.length,6)/2)*(ih+6)+6;
    }
    y += 4;
  });

  // ── Signature ──
  if(y > 210) { doc.addPage(); y = 18; }
  doc.setFillColor(...C.gray); doc.setDrawColor(...C.border); doc.setLineWidth(0.3);
  doc.roundedRect(margin, y, W-margin*2, 46, 2, 2, 'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...C.teal);
  doc.text('SIGNATURE CLIENT / CLIENT SIGNATURE', margin+4, y+7);
  if(r.signer) {
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...C.text3);
    doc.text('Signé par: '+r.signer, margin+4, y+13);
  }
  if(sigImg) {
    try {
      const fmt = sigImg.startsWith('data:image/jpeg') ? 'JPEG' : 'PNG';
      doc.addImage(sigImg, fmt, margin+4, y+15, 68, 24);
    } catch(e) { console.warn('Signature image error:', e); }
  }
  doc.setDrawColor(...C.border); doc.setLineWidth(0.4);
  doc.line(W-margin-60, y+36, W-margin-4, y+36);
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...C.navy);
  doc.text(tech, W-margin-4, y+33, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...C.text3);
  doc.text('Technicien', W-margin-4, y+42, {align:'right'});

  // ── Footer ──
  doc.setFillColor(...C.navy); doc.rect(0, 270, W, 9.4, 'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(160,175,190);
  doc.text('B-Mak ServicePro · '+rnum+' · '+new Date().toLocaleDateString('fr-CA'), margin, 275.5);
  doc.setTextColor(...C.teal);
  doc.text('Document confidentiel / Confidential', W-margin, 275.5, {align:'right'});

  const filename = 'Rapport_BMak_'+(c.nom||'client').replace(/[^a-zA-Z0-9]/g,'_')+'_'+date+'.pdf';
  doc.save(filename);
}

let curFilter='all', curSearch='';

function setFilter(f){
  curFilter=f;
  ['all','brouillon','bon','suivi','hors'].forEach(x=>{
    const el=document.getElementById('f-'+x);
    if(!el) return;
    const isActive=x===f;
    if(isActive){ el.className='badge badge-teal'; el.style.cssText=''; }
    else{ el.className='badge'; el.style.cssText='background:#fff;color:var(--text3);border:1px solid var(--border)'; }
  });
  render();
}

function render(){
  const rapports = DB.rapportsSync();
  const q = curSearch.toLowerCase();
  const filtered = rapports.filter(r => {
    const c = DB.clientById(r.cid);
    const matchQ = !q
      || (c && c.nom.toLowerCase().includes(q))
      || (r.tech && r.tech.toLowerCase().includes(q))
      || (r.rnum && r.rnum.toLowerCase().includes(q));
    if(!matchQ) return false;
    const isBrouillon = r.statut === 'brouillon';
    const etats = r.taches ? r.taches.map(t=>t.etat||'').join(' ') : '';
    if(curFilter==='all')       return !isBrouillon;
    if(curFilter==='brouillon') return isBrouillon;
    if(curFilter==='bon')       return !isBrouillon && etats.includes('Bon');
    if(curFilter==='suivi')     return !isBrouillon && (etats.includes('Suivi')||etats.includes('Pièces'));
    if(curFilter==='hors')      return !isBrouillon && etats.includes('Hors');
    return !isBrouillon;
  });

  const el = document.getElementById('rapport-list');
  if(!filtered.length){
    el.innerHTML='<div class="empty"><div class="empty-ico">📁</div><div class="empty-txt">Aucun rapport trouvé</div></div>';
    return;
  }
  el.innerHTML = filtered.map(r => {
    const c = DB.clientById(r.cid);
    const m = r.mid ? DB.machineById(r.mid) : null;
    const firstEtat = r.taches && r.taches[0] ? r.taches[0].etat : '';
    const s = statusSty(firstEtat);
    const photoTotal = r.taches ? r.taches.reduce((acc,t)=>acc+(Array.isArray(t.photos)?t.photos.length:(t.photos||0)),0) : 0;
    const isBrouillon = r.statut === 'brouillon';
    return '<div class="rapport-card" data-id="'+r.id+'" style="'+(isBrouillon?'border-left:3px solid #ff9500;':'')+'">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">' +
      '<div style="flex:1;min-width:0">' +
      '<div class="rapport-date">'+(isBrouillon?'✏️ BROUILLON · ':'')+fmtDate(r.date)+' · '+(r.tech||'')+(r.rnum?' · '+r.rnum:'')+(r.dur?' · '+r.dur:'')+'</div>' +
      '<div class="rapport-title">'+(c?c.nom:'Client inconnu')+'</div>' +
      '<div class="rapport-sub">'+(m?m.type+' · ':'')+(r.taches?r.taches.length+' tâche(s)':'')+(photoTotal?' · 📷 '+photoTotal:'')+'</div>' +
      '</div>' +
      (firstEtat?'<span class="badge" style="background:'+s.bg+';color:'+s.color+';border:1px solid '+s.border+';flex-shrink:0">'+firstEtat.split(' ')[0]+'</span>':'')+
      '</div></div>';
  }).join('');
  el.querySelectorAll('.rapport-card').forEach(el=>{
    el.addEventListener('click', function(){ showDetail(this.dataset.id); });
  });
}

function showDetail(id){
  const r = DB.rapportsSync().find(x => x.id === id);
  if(!r) return;
  const c = DB.clientById(r.cid);
  const m = r.mid ? DB.machineById(r.mid) : null;
  const photoTotal = r.taches ? r.taches.reduce((acc,t)=>acc+(Array.isArray(t.photos)?t.photos.length:(t.photos||0)),0) : 0;
  const isBrouillon = r.statut === 'brouillon';
  const el = document.getElementById('detail-content');
  el.innerHTML = '';

  // Title
  const title = document.createElement('div');
  title.style.cssText = 'font-size:18px;font-weight:700;color:var(--navy);margin-bottom:14px';
  title.textContent = c ? c.nom : 'Rapport';
  el.appendChild(title);

  // Action buttons
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap';
  if(isBrouillon){
    const b = document.createElement('button');
    b.className='btn btn-primary'; b.style.cssText='font-size:14px;padding:11px';
    b.textContent='✏️ Continuer le rapport';
    b.onclick = () => continueDraft(r.id);
    btnRow.appendChild(b);
  } else {
    const b = document.createElement('button');
    b.className='btn btn-primary'; b.style.cssText='font-size:14px;padding:11px';
    b.textContent='📄 Télécharger le PDF';
    b.onclick = () => regenPDF(r.id);
    btnRow.appendChild(b);
    const bEdit = document.createElement('button');
    bEdit.className='btn btn-out'; bEdit.style.cssText='font-size:14px;padding:11px';
    bEdit.textContent='✏️ Modifier';
    bEdit.onclick = () => editRapport(r.id);
    btnRow.appendChild(bEdit);
  }
  const delBtn = document.createElement('button');
  delBtn.className='btn btn-out'; delBtn.style.cssText='width:auto;padding:11px 14px';
  delBtn.textContent='🗑️';
  delBtn.onclick = () => deleteRapport(r.id);
  btnRow.appendChild(delBtn);
  el.appendChild(btnRow);

  // Info card
  let infoHTML = '<div class="card" style="margin-bottom:10px">' +
    '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:5px">Général</div>' +
    '<div style="font-size:13px;color:var(--text3)">'+fmtDate(r.date)+' · '+(r.tech||'')+(r.rnum?' · No. '+r.rnum:'')+(r.dur?' · '+r.dur:'')+'</div>' +
    (m?'<div style="font-size:13px;color:var(--text3);margin-top:4px">'+m.type+' · '+m.marque+'</div>':'')+
    (r.signer?'<div style="font-size:13px;color:var(--text3);margin-top:4px">✍️ '+r.signer+'</div>':'')+
    (photoTotal?'<div style="font-size:13px;color:var(--text3);margin-top:4px">📷 '+photoTotal+' photo(s)</div>':'')+
    '</div>';

  if(r.taches) r.taches.forEach((t,i) => {
    const s = statusSty(t.etat);
    const pCount = Array.isArray(t.photos)?t.photos.length:(t.photos||0);
    infoHTML += '<div class="card" style="margin-bottom:10px;border-left:3px solid var(--teal)">' +
      '<div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;margin-bottom:6px">Tâche '+(i+1)+(t.itype?' — '+t.itype:'')+'</div>' +
      '<div style="font-size:14px;color:var(--navy);margin-bottom:6px">'+(t.desc||'')+'</div>' +
      (t.etat?'<span class="badge" style="background:'+s.bg+';color:'+s.color+';border:1px solid '+s.border+'">'+t.etat+'</span>':'')+
      (t.reco?'<div style="font-size:13px;color:var(--text3);margin-top:6px">💡 '+t.reco+'</div>':'')+
      (pCount?'<div style="font-size:12px;color:var(--teal);margin-top:4px;font-weight:600">📷 '+pCount+'</div>':'')+
      '</div>';
  });

  const infoDiv = document.createElement('div');
  infoDiv.innerHTML = infoHTML;
  el.appendChild(infoDiv);

  document.getElementById('modal-detail').style.display='flex';
}


function editRapport(id){
  // Open rapport for editing (keeps statut as final)
  localStorage.setItem('bmak_edit_rapport_id', id);
  location.href = './rapport.html';
}

function regenPDF(id){
  const r = DB.rapportsSync().find(x => x.id === id);
  if(!r){ alert('Rapport introuvable'); return; }
  const c = DB.clientById(r.cid);
  if(!c){ alert('Client introuvable.'); return; }
  try { buildReportPDF(r); } catch(e){ alert('Erreur PDF: '+e.message); }
}

function continueDraft(id){
  localStorage.setItem('bmak_draft_id', id);
  location.href = './rapport.html';
}

async function deleteRapport(id){
  if(!confirm('Supprimer ce rapport définitivement ?')) return;
  await DB.delRapport(id);
  closeDetail();
  render();
}

function closeDetail(){ document.getElementById('modal-detail').style.display='none'; }
document.getElementById('search').addEventListener('input', function(){ curSearch=this.value; render(); });

async function init() {
  await Promise.all([DB.clients(), DB.machines(), DB.rapports()]);
  setFilter('all');
}
init();
</script>


<script>
setTimeout(function() {
  if (typeof DB_VERSION === 'undefined' || DB_VERSION < 27) {
    var reloadCount = parseInt(sessionStorage.getItem('reloadCount') || '0');
    if (reloadCount < 2) {
      sessionStorage.setItem('reloadCount', reloadCount + 1);
      window.location.reload(true);
    } else {
      sessionStorage.removeItem('reloadCount');
    }
  } else {
    sessionStorage.removeItem('reloadCount');
  }
}, 1000);
</script>
<script>
// Unregister service worker to prevent caching
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
