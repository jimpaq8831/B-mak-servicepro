<html lang="fr"><head>
<title>B-Mak ServicePro</title>

  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<script>
// Unregister service worker to prevent caching
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
<div id="sync-badge" style="display:none;position:fixed;top:58px;right:8px;z-index:99;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;transition:opacity .3s"></div>

<div class="hdr">
  <div class="hdr-logo">B-Mak</div>
  <div class="hdr-title">Tableau de bord</div>
</div>

<div class="main">
  <div class="stats" id="stats"></div>

  <div class="sec">Prochains appels de service</div>
  <div id="appels-today"></div>

  <div class="sec">Derniers rapports</div>
  <div id="rapports-recent"></div>

  <div class="sec">Accès rapide</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <a href="./rapport.html" style="text-decoration:none">
      <div class="card" style="text-align:center;padding:20px 10px;cursor:pointer">
        <div style="font-size:30px;margin-bottom:6px">📋</div>
        <div style="font-size:13px;font-weight:700;color:var(--navy)">Nouveau rapport</div>
      </div>
    </a>
    <a href="./calendrier.html" style="text-decoration:none">
      <div class="card" style="text-align:center;padding:20px 10px;cursor:pointer">
        <div style="font-size:30px;margin-bottom:6px">📅</div>
        <div style="font-size:13px;font-weight:700;color:var(--navy)">Calendrier</div>
      </div>
    </a>
    <a href="./clients.html" style="text-decoration:none">
      <div class="card" style="text-align:center;padding:20px 10px;cursor:pointer">
        <div style="font-size:30px;margin-bottom:6px">🏭</div>
        <div style="font-size:13px;font-weight:700;color:var(--navy)">Clients</div>
      </div>
    </a>
    <a href="./historique.html" style="text-decoration:none">
      <div class="card" style="text-align:center;padding:20px 10px;cursor:pointer">
        <div style="font-size:30px;margin-bottom:6px">📁</div>
        <div style="font-size:13px;font-weight:700;color:var(--navy)">Historique</div>
      </div>
    </a>
  </div>
</div>

<nav class="nav">
  <a href="./index.html" class="nav-item active"><span class="nav-icon">🏠</span>Accueil</a>
  <a href="./clients.html" class="nav-item "><span class="nav-icon">🏭</span>Clients</a>
  <a href="./rapport.html" class="nav-item "><span class="nav-icon">📋</span>Rapport</a>
  <a href="./techniciens.html" class="nav-item "><span class="nav-icon">👷</span>Techs</a>
  <a href="./calendrier.html" class="nav-item "><span class="nav-icon">📅</span>Agenda</a>
</nav>


<script>
// Bootstrap
// Load from Supabase
function openRapport(id) {
  // Open specific rapport in historique with that rapport selected
  localStorage.setItem('bmak_open_rapport_id', id);
  window.location.href = './historique.html';
}
init();

async function init() {
  // Load directly from Supabase (not just cache)
  const [clients, machines, rapports, appels] = await Promise.all([
    DB.clients(), DB.machines(), DB.rapports(), DB.appels()
  ]);
  const today = new Date().toISOString().split('T')[0];

  // Stats
  document.getElementById('stats').innerHTML=[
    {n:clients.length,l:'Clients'},
    {n:machines.length,l:'Machines'},
    {n:rapports.length,l:'Rapports'},
    {n:appels.filter(a=>a.statut!=='Terminé').length,l:'Appels à venir'}
  ].map(s=>'<div class="stat"><div class="stat-n">'+s.n+'</div><div class="stat-l">'+s.l+'</div></div>').join('');

  // Prochains appels (7 jours)
  const week=new Date(Date.now()+7*864e5).toISOString().split('T')[0];
  // Include: dated appels this week + undated Non-cédulé/En attente
  const dated=appels.filter(a=>a.date&&a.date!=='0000-00-00'&&a.date>=today&&a.date<=week);
  const undated=appels.filter(a=>(!a.date||a.date==='0000-00-00')&&(a.statut==='Non-cédulé'||a.statut==='En attente'));
  const prochains=[...dated.sort((a,b)=>a.date.localeCompare(b.date)),...undated].slice(0,4);
  const elA=document.getElementById('appels-today');
  if(!prochains.length){elA.innerHTML='<div class="empty"><div class="empty-ico">📅</div><div class="empty-txt">Aucun appel cette semaine</div></div>';}
  else{elA.innerHTML=prochains.map(a=>{
    const c=DB.clientById(a.cid);
    const dateLabel=(!a.date||a.date==='0000-00-00')?'📅 '+( a.statut||'Non-cédulé'):fmtDate(a.date)+' — '+a.heure;
    const statColors={'Non-cédulé':'#8e8e93','En attente':'#ff9500','En cours':'#037F8C','Terminé':'#34c759'};
    const sc=statColors[a.statut||'Non-cédulé']||'#8e8e93';
    return '<div class="appel-card" style="border-left-color:'+sc+'">'+
      '<div class="appel-date">'+dateLabel+'</div>'+
      '<div class="appel-title">'+(c?c.nom:'Client inconnu')+'</div>'+
      '<div class="appel-sub">'+a.titre+'</div></div>';
  }).join('');}

  // Derniers rapports
  const elR=document.getElementById('rapports-recent');
  if(!rapports.length){elR.innerHTML='<div class="empty"><div class="empty-ico">📋</div><div class="empty-txt">Aucun rapport enregistré</div></div>';}
  else{
    elR.innerHTML=rapports.slice(0,3).map(r=>{
      const c=DB.clientById(r.cid);
      const etat=r.taches&&r.taches[0]?r.taches[0].etat:'';
      const s=statusSty(etat);
      let h='<div class="rapport-card" style="cursor:pointer" data-rid="'+r.id+'" onclick="openRapport(this.getAttribute(&quot;data-rid&quot;))">';
      h+='<div class="rapport-date">'+fmtDate(r.date)+' · '+r.tech+'</div>';
      h+='<div class="rapport-title">'+(c?c.nom:'—')+'</div>';
      h+='<div class="rapport-sub">'+(r.taches?r.taches.length+' tâche(s)':'')+(etat?' · <span style="color:'+s.color+'">'+etat+'</span>':'')+'</div>';
      h+='</div>';
      return h;
    }).join('');
  }
}
</script>


</body></html>
